services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gharchive
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5433:5432"
  
  seed:
    build: ./seed
    volumes:
      - ./pipeline:/app/pipeline
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: gharchive
      DB_USER: postgres
      DB_PASSWORD: postgres
    depends_on:
      postgres:
        condition: service_healthy

  scheduler:
    build: ./scheduler
    volumes:
      - ./pipeline:/app/pipeline
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: gharchive
      DB_USER: postgres
      DB_PASSWORD: postgres
      PIPELINE_WORKERS: 4
    depends_on:
      seed:
        condition: service_completed_successfully

  transform:
    build: ./transform
    volumes:
      - ./warehouse/transform.sql:/app/transform.sql
      - ./warehouse/schema.sql:/app/schema.sql
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: gharchive
      DB_USER: postgres
      DB_PASSWORD: postgres
    depends_on:
      seed:
        condition: service_completed_successfully

  mcp_server:
    build: ./mcp_server
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: gharchive
      DB_USER: postgres
      DB_PASSWORD: postgres
      # Run the in-container MCP server over HTTP so the published port is
      # actually reachable. The README's Claude Desktop integration still
      # uses stdio, which launches a separate host-local Python process.
      MCP_TRANSPORT: streamable-http
      MCP_HOST: 0.0.0.0
      MCP_PORT: 8000
    depends_on:
      transform:
        condition: service_completed_successfully
    ports:
      - "8000:8000"

volumes:
  pgdata: