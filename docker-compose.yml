services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gharchive
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5433:5432"
  
  seed:
    build: ./seed
    volumes:
      - ./pipeline:/app/pipeline
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: gharchive
      DB_USER: postgres
      DB_PASSWORD: postgres
    depends_on:
      postgres:
        condition: service_healthy

  scheduler:
    build: ./scheduler
    volumes:
      - ./pipeline:/app/pipeline
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: gharchive
      DB_USER: postgres
      DB_PASSWORD: postgres
      PIPELINE_WORKERS: 4
    depends_on:
      seed:
        condition: service_completed_successfully

  transform:
    build: ./transform
    volumes:
      - ./warehouse/transform.sql:/app/transform.sql
      - ./warehouse/schema.sql:/app/schema.sql
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: gharchive
      DB_USER: postgres
      DB_PASSWORD: postgres
    depends_on:
      seed:
        condition: service_completed_successfully

volumes:
  pgdata: