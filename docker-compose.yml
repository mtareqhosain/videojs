services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "${POSTGRES_HOST_PORT}:5432"
  
  seed:
    build: ./seed
    volumes:
      - ./pipeline:/app/pipeline
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy

  scheduler:
    build: ./scheduler
    volumes:
      - ./pipeline:/app/pipeline
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      PIPELINE_WORKERS: ${PIPELINE_WORKERS}
    depends_on:
      seed:
        condition: service_completed_successfully

  transform:
    build: ./transform
    volumes:
      - ./warehouse/transform.sql:/app/transform.sql
      - ./warehouse/schema.sql:/app/schema.sql
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
    depends_on:
      seed:
        condition: service_completed_successfully

  mcp_server:
    build: ./mcp_server
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      # Run the in-container MCP server over HTTP so the published port is
      # actually reachable. The README's Claude Desktop integration still
      # uses stdio, which launches a separate host-local Python process.
      MCP_TRANSPORT: ${MCP_TRANSPORT}
      MCP_HOST: ${MCP_HOST}
      MCP_PORT: ${MCP_PORT}
    depends_on:
      transform:
        condition: service_completed_successfully
    ports:
      - "${MCP_PORT}:8000"

volumes:
  pgdata:
